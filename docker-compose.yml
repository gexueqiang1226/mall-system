version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: m.daocloud.io/docker.io/library/mysql:8.0
    container_name: mall-mysql
    command: >
      mysqld
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --init-connect='SET NAMES utf8mb4'
      --skip-character-set-client-handshake
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mall_system
      TZ: 'Asia/Shanghai'
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mall-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: m.daocloud.io/docker.io/library/redis:7-alpine
    container_name: mall-redis
    command: redis-server --requirepass redis123
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - mall-network
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot 后端
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mall-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mall_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: redis123
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mall-network
    volumes:
      - ./backend/logs:/app/logs

  # Vue 3 后台管理
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: mall-admin
    ports:
      - "5173:5173"
    networks:
      - mall-network
    environment:
      VITE_API_BASE_URL: http://localhost:8080/admin/api

volumes:
  mysql_data:
  redis_data:

networks:
  mall-network:
    driver: bridge
