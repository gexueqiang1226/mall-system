name: Mall System CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

jobs:
  # =============================================================================
  # 后端测试 + 构建
  # =============================================================================
  backend:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0.33
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mall_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      
      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Run Unit Tests
      run: |
        cd backend
        mvn clean test -B
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/mall_system_test?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: root
        SPRING_REDIS_HOST: localhost
        SPRING_REDIS_PORT: 6379

    - name: Build JAR
      run: |
        cd backend
        mvn clean package -DskipTests -B

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: backend/target/mall-system-*.jar
        retention-days: 7

  # =============================================================================
  # 前端构建
  # =============================================================================
  admin:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: admin/package-lock.json

    - name: Install dependencies
      run: |
        cd admin
        npm ci

    - name: Build
      run: |
        cd admin
        npm run build

    - name: Upload dist artifact
      uses: actions/upload-artifact@v4
      with:
        name: admin-dist
        path: admin/dist/
        retention-days: 7

  # =============================================================================
  # 小程序构建
  # =============================================================================
  weapp:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: weapp/package-lock.json

    - name: Install dependencies
      run: |
        cd weapp
        npm ci

    - name: Build H5
      run: |
        cd weapp
        npm run build:h5

  # =============================================================================
  # Docker 镜像构建
  # =============================================================================
  docker:
    runs-on: ubuntu-latest
    needs: [ backend, admin ]
    
    steps:
    - uses: actions/checkout@v4

    - name: Download backend JAR
      uses: actions/download-artifact@v4
      with:
        name: backend-jar
        path: backend/target/

    - name: Download admin dist
      uses: actions/download-artifact@v4
      with:
        name: admin-dist
        path: admin/dist/

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker images
      run: |
        docker compose build

    - name: Test Docker Compose
      run: |
        docker compose up -d
        sleep 20
        docker compose ps
        docker compose down
